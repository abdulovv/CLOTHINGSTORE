server:
  port: 8081

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/clothing_store
    username: postgres
    password: postgres123

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: product_schema

  flyway:
    enabled: false # Временно отключаем, чтобы Hibernate сам создал таблицы для теста

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/