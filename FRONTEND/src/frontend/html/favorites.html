<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Избранное</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .page-container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 600px;
        text-align: center;
      }
      .empty-message {
        color: #888;
        margin: 30px 0;
      }
      .back-link {
        color: #007bff;
        text-decoration: none;
        font-size: 14px;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <h2>Ваш список избранного</h2>
      <p class="empty-message">
        Здесь будут отображаться товары, которые вы сохранили.
      </p>

      <a href="index.html" class="back-link">&larr; Вернуться на главную</a>
    </div>
  </body>
</html>
