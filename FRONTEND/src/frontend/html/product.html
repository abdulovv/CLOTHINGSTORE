<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карточка товара | ABDULOVV STORE</title>
    <link rel="stylesheet" href="../css/product.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-left"></div>

      <div class="header-center">
        <a href="../html/index.html" class="logo-text">ABDULOVV STORE</a>
      </div>

      <div class="header-right">
        <button
          class="nav-item"
          onclick="window.location.href = '../html/favorites.html'"
          aria-label="Избранное"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            ></path>
          </svg>
        </button>
        <button
          class="nav-item"
          onclick="window.location.href = '../html/cart.html'"
          aria-label="Корзина"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path
              d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
            ></path>
          </svg>
        </button>
        <a href="../html/login.html" class="nav-item" aria-label="Войти">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
      </div>
    </header>

    <main class="product-page-container">
      <div class="product-gallery">
        <div class="main-image-box">Большое фото товара</div>
        <div class="thumbs-images">
          <div class="thumb-stub active">Фото 1</div>
          <div class="thumb-stub">Фото 2</div>
          <div class="thumb-stub">Фото 3</div>
        </div>
      </div>

      <div class="product-shop-info">
        <div class="product-header-info">
          <h1 class="product-brand-title" id="productName">—</h1>
          <p class="product-name-title" id="productCategory"></p>
          <div class="product-price-box" id="productPrice"></div>
        </div>

        <div class="size-selector-section">
          <div class="size-header">
            <span>Выберите размер:</span>
            <a href="#" class="size-table-link">Таблица размеров</a>
          </div>
          <div class="sizes-grid" id="sizes"></div>
        </div>

        <div class="purchase-actions">
          <button class="add-to-cart-btn" onclick="addToCart()">
            Добавить в корзину
          </button>
          <button class="add-to-fav-btn" onclick="addToFav()">&#9825;</button>
        </div>

        <div class="product-description-accordion">
          <h3>Описание товара</h3>
          <p id="productDescription"></p>
          <ul>
            <li><strong>Пол:</strong> <span id="productSex">—</span></li>
          </ul>
        </div>
      </div>
    </main>

    <script src="../js/product.js"></script>
  </body>
</html>
